# =============================================================================
# samba paper — App container
# Requer: samba-db rodando (docker compose up -d em samba-db/)
# =============================================================================
#
# Uso:
#   docker compose up -d          → sobe o app
#   docker compose down           → para
#   docker compose logs -f app    → logs em tempo real
#   docker compose up -d --build  → rebuild da imagem

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samba_paper_app
    env_file: .env.docker
    ports:
      - "3006:3006"
    volumes:
      - paper_storage:/app/storage
    restart: unless-stopped
    networks:
      - samba_network

volumes:
  paper_storage:

networks:
  samba_network:
    external: true
    name: samba_network
